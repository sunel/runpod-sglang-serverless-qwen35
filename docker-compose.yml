services:
  sglang-worker:
    image: runpod/worker-sglang:dev
    pull_policy: never

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      - HOST=0.0.0.0
      - PORT=30000
      - MODEL_NAME=Jackrong/Qwen3.5-35B-A3B-Claude-4.6-Opus-Reasoning-Distilled
      - TRUST_REMOTE_CODE=true
      - HF_TOKEN=${HF_TOKEN}
      - HF_HUB_ENABLE_HF_TRANSFER=1

      # --- Performance tuning for L40S (48GB VRAM) ---
      # BF16 is the native dtype for Qwen3.5; L40S supports BF16 natively
      - DTYPE=bfloat16
      # Use FlashInfer for attention & sampling — best perf on Ampere/Ada GPUs
      - ATTENTION_BACKEND=flashinfer
      - SAMPLING_BACKEND=flashinfer
      # Single L40S can hold 35B MoE (only ~3B active params per token)
      - TENSOR_PARALLEL_SIZE=1
      # Allocate 90% of VRAM to KV-cache for maximum throughput
      - MEM_FRACTION_STATIC=0.90
      # Model was trained with 8192 context; match it for best quality
      - CONTEXT_LENGTH=8192
      # Enable chunked prefill for better scheduling with long prompts
      - CHUNKED_PREFILL_SIZE=8192
      - MAX_PREFILL_TOKENS=16384
      # Limit cuda graph batch sizes to save memory on MoE routing
      - CUDA_GRAPH_MAX_BS=32
      # Schedule policy — optimise for low-latency first-token
      - SCHEDULE_POLICY=lpm
      # Log level
      - LOG_LEVEL=info

    ports:
      - "8000:8000"

    volumes:
      - ../var/runpod-volume:/runpod-volume
